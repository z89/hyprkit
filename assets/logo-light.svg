<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d59a1"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3d59a1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Icon: stylized color swatch / palette fan -->
  <g transform="translate(28, 16)">
    <rect x="16" y="8" width="12" height="56" rx="6" fill="#3d59a1" transform="rotate(-20, 22, 36)" opacity="0.9"/>
    <rect x="32" y="4" width="12" height="60" rx="6" fill="#7c3aed" transform="rotate(0, 38, 34)"/>
    <rect x="48" y="8" width="12" height="56" rx="6" fill="#e11d48" transform="rotate(20, 54, 36)" opacity="0.9"/>
    <circle cx="38" cy="72" r="5" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <line x1="42" y1="76" x2="52" y2="86" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Text: hyprkit -->
  <text x="118" y="72" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace" font-size="52" font-weight="700" letter-spacing="-1">
    <tspan fill="#1a1b26">hypr</tspan><tspan fill="url(#grad)">kit</tspan>
  </text>

  <!-- Tagline bar -->
  <rect x="118" y="82" width="220" height="2" rx="1" fill="url(#grad)" opacity="0.4"/>
</svg>
